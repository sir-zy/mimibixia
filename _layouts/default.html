<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    <div class="notebook">
      <header class="notebook-header">
        <h1 class="site-title"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
        <p class="site-desc">{{ site.description }}</p>
        <nav class="simple-nav">
          <a href="{{ site.baseurl }}/">📒 所有笔记</a>
          <a href="{{ site.baseurl }}/about/">👤 关于</a>
        </nav>
      </header>

      <main class="notebook-content">
        {{ content }}
      </main>

      <footer class="notebook-footer">
        <p>📓 {{ site.time | date: '%Y' }} {{ site.name }} · 记录生活</p>
      </footer>
    </div>

    {% include analytics.html %}
  </body>
</html>
